plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}


def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
def hasKeystoreProperties = keystorePropertiesFile.exists()
if (hasKeystoreProperties) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    compileSdk 34
    ndkVersion "28.0.13004108"

    splits{
        abi {
            reset()
            include 'arm64-v8a', 'x86_64'
            enable true
            universalApk true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.github.pacalini.pica_comic"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdkVersion flutter.minSdkVersion
        targetSdk 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    signingConfigs {
        debug {
            if (hasKeystoreProperties) {
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
        release {
            if (hasKeystoreProperties) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        release {
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig hasKeystoreProperties ? signingConfigs.release : signingConfigs.debug
            applicationVariants.all { variant ->
                variant.outputs.all { output ->
                    def abi = output.getFilter(com.android.build.OutputFile.ABI)
                    if (abi != null) {   // null for the universal-debug, universal-release variants
                        outputFileName = "PicaComic-${variant.versionName}-${abi}.apk"
                    } else {
                        outputFileName = "PicaComic-${variant.versionName}.apk"
                    }
                }
            }
        }
    }
    namespace 'com.github.pacalini.pica_comic'
}

flutter {
    source '../..'
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    implementation 'com.google.android.gms:play-services-base:18.3.0'
}

def patchFlutterKernelSdkHash = { File kernelFile ->
    if (!kernelFile.exists()) {
        return
    }

    def oldHash = 'd684a576a6'
    def engineHash = '9811646114'
    def bytes = kernelFile.bytes
    def content = new String(bytes, 'ISO-8859-1')
    if (content.contains(oldHash)) {
        kernelFile.bytes = content.replace(oldHash, engineHash).getBytes('ISO-8859-1')
        logger.lifecycle("Patched Flutter kernel SDK hash in ${kernelFile}")
    }
}

tasks.register('fixDebugFlutterKernelSdkHash') {
    outputs.upToDateWhen { false }

    doLast {
        patchFlutterKernelSdkHash(file("${buildDir}/intermediates/flutter/debug/flutter_assets/kernel_blob.bin"))
        patchFlutterKernelSdkHash(file("${buildDir}/intermediates/assets/debug/mergeDebugAssets/flutter_assets/kernel_blob.bin"))
    }
}

afterEvaluate {
    tasks.named('fixDebugFlutterKernelSdkHash') {
        dependsOn tasks.named('copyFlutterAssetsDebug')
    }

    ['compressDebugAssets', 'packageDebug', 'packageDebugUniversalApk'].each { taskName ->
        tasks.named(taskName) {
            dependsOn tasks.named('fixDebugFlutterKernelSdkHash')
            outputs.upToDateWhen { false }
        }
    }
}
